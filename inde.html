<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple AI </title>
    <style>
        /* Pure Dark Background - Koi extra UI element nahi */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e11;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <script>
    (function(){
        // 1. Inject Neon Red Styles
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes proScan {
                0% { top: -10%; opacity: 0; }
                50% { opacity: 1; }
                100% { top: 110%; opacity: 0; }
            }
            .apple-pro-scanner {
                position: fixed;
                left: 0;
                width: 100%;
                height: 100px;
                background: linear-gradient(to bottom, transparent, rgba(255, 0, 0, 0.4), #ff0000);
                border-bottom: 3px solid #ff0000;
                z-index: 2147483647;
                pointer-events: none;
                display: none;
            }
            .apple-glow {
                filter: drop-shadow(0px 0px 25px #ff0000);
                transform: scale(1.08);
            }
        `;
        document.head.appendChild(style);

        // 2. Create Scanner Element
        const scanner = document.createElement('div');
        scanner.className = 'apple-pro-scanner';
        document.body.appendChild(scanner);

        let isTrading = false;

        // 3. Remove Old UI if exists
        const oldUI = document.querySelector('[id^="mango-v"]') || document.querySelector('[id^="apple-v"]');
        if (oldUI) oldUI.remove();

        // 4. Create Main Floating Container
        const container = document.createElement('div');
        container.id = 'apple-v8-bm';
        container.style.cssText = 'position:fixed;top:160px;left:30px;z-index:2147483647;cursor:pointer;text-align:center;transition:0.3s;';

        // Logo Element (Apple Logo link)
        const logo = document.createElement('img');
        logo.src = 'https://i.ibb.co/GfLyBhRZ/apple.png';
        logo.style.cssText = 'width:85px; display:block; margin:0 auto;';

        // Label Element (APPLE AI with Red/Golden shadow style)
        const label = document.createElement('div');
        label.innerText = 'APPLE AI';
        label.style.cssText = 'color:#FF0000;font-family:sans-serif;font-weight:bold;font-size:14px;margin-top:5px;text-shadow:2px 2px 4px #000;';

        container.appendChild(logo);
        container.appendChild(label);
        document.body.appendChild(container);

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        // Toggle Scanning Animation
        function toggleScanner(show) {
            scanner.style.display = show ? 'block' : 'none';
            scanner.style.animation = show ? 'proScan 1.2s linear infinite' : 'none';
        }

        // Find Up/Down Trading Buttons (Isolate checking from background elements)
        function findTradeButtons() {
            let allBtns = Array.from(document.querySelectorAll('button,.button,[role="button"],.btn'));
            let badWords = ['help','support','deposit','faq','tutorial','contact','?','info'];
            
            let up = allBtns.find(b => {
                let t = b.innerText.toLowerCase();
                return (b.classList.contains('success') || b.classList.contains('call') || b.classList.contains('up') || t.includes('up') || t.includes('call')) && !badWords.some(w => t.includes(w));
            });
            
            let down = allBtns.find(b => {
                let t = b.innerText.toLowerCase();
                return (b.classList.contains('danger') || b.classList.contains('put') || b.classList.contains('down') || t.includes('down') || t.includes('put')) && !badWords.some(w => t.includes(w));
            });
            
            return { up, down };
        }

        // Main Bot Logic Loop
        async function startBot() {
            let isFirst = true;
            while (isTrading) {
                try {
                    toggleScanner(true);
                    
                    let wait = isFirst ? 2000 : (Math.floor(Math.random() * 6) + 5) * 1000;
                    await sleep(wait);
                    
                    if (!isTrading) break;
                    
                    let btns = findTradeButtons();
                    if (btns.up && btns.down) {
                        let isUp = Math.random() < 0.5;
                        let target = isUp ? btns.up : btns.down;
                        
                        toggleScanner(false);
                        
                        target.click(); 
                        isFirst = false;
                        
                        let durInput = document.querySelector('.input-control__input,input[name="expiry"],.timer-input');
                        let tradeTime = 5;
                        
                        if (durInput && durInput.value) {
                            let v = durInput.value;
                            if (v.includes(':')) {
                                let p = v.split(':').map(Number);
                                tradeTime = p.length === 3 ? (p[0] * 3600 + p[1] * 60 + p[2]) : (p[0] * 60 + p[1]);
                            } else {
                                tradeTime = parseInt(v) || 5;
                            }
                        }
                        
                        await sleep((tradeTime * 1000) + 2000);
                    } else {
                        // Agar platform button na milein to scan loop chalti rahegi silently
                        await sleep(1000);
                    }
                } catch (e) {
                    toggleScanner(false);
                    await sleep(2000);
                }
            }
        }

        // Click Event Listener for Toggle (Floating Apple System logo)
        container.onclick = () => {
            if (!isTrading) {
                isTrading = true;
                container.classList.add('apple-glow');
                startBot();
            } else {
                isTrading = false;
                container.classList.remove('apple-glow');
                toggleScanner(false);
            }
        };
    })();
    </script>
</body>
</html>
